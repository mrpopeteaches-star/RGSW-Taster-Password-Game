<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#dff3ff" />
  <title>System Restore</title>
  <style>
    :root {
      --blue: #dff3ff;
      --blue-dark: #6ba7cc;
      --green: #c9f7d6;
      --green-dark: #2f9250;
      --red: #ffd9d9;
      --red-dark: #b34040;
      --panel: rgba(255,255,255,0.86);
      --text: #143142;
      --shadow: 0 18px 45px rgba(19, 62, 89, 0.12);
      --radius: 28px;
      --transition: 240ms ease;
      --lock-size: clamp(4.6rem, 12vw, 6.5rem);
      --button-height: clamp(3rem, 7vw, 3.8rem);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--blue);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      transition: background-color 260ms ease;
      overflow: hidden;
    }

    body.state-default { background: var(--blue); }
    body.state-success { background: var(--green); }
    body.state-error { background: var(--red); }
    body.state-complete { background: var(--green); }

    .panel {
      width: min(100%, 760px);
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(1.2rem, 4vw, 2.2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
      transition: transform var(--transition), opacity 700ms ease;
      transform-origin: center;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.03em;
      font-size: clamp(1.8rem, 4.3vw, 2.8rem);
      line-height: 1.05;
    }

    .subtext {
      margin: 0;
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      opacity: 0.92;
      min-height: 1.6em;
    }

    .progress {
      font-weight: 700;
      font-size: 0.95rem;
      color: rgba(20, 49, 66, 0.7);
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.66);
    }

    .locks {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(0.5rem, 2vw, 1rem);
      align-items: center;
      justify-items: center;
      margin-top: 0.45rem;
      transition: opacity 450ms ease, transform 700ms cubic-bezier(.2,1,.3,1), filter 450ms ease;
    }

    .digit-lock {
      width: 100%;
      max-width: 132px;
      display: grid;
      gap: 0.45rem;
      justify-items: center;
    }

    .step-btn, .submit-btn, .reset-btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      color: white;
      background: var(--blue-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, opacity var(--transition), background var(--transition), box-shadow var(--transition);
      user-select: none;
      touch-action: manipulation;
      font-weight: 800;
    }

    .step-btn {
      width: 100%;
      height: var(--button-height);
      font-size: clamp(1.15rem, 3vw, 1.4rem);
      box-shadow: 0 10px 20px rgba(107, 167, 204, 0.24);
    }

    .step-btn:active,
    .submit-btn:active,
    .reset-btn:active {
      transform: scale(0.96);
    }

    .digit-display {
      width: 100%;
      height: var(--lock-size);
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: white;
      border: 2px solid rgba(107, 167, 204, 0.26);
      font-size: clamp(2.1rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.35rem;
    }

    .submit-btn, .reset-btn {
      min-width: 180px;
      min-height: 3.5rem;
      padding: 0.95rem 1.5rem;
      font-size: 1.05rem;
      box-shadow: 0 12px 24px rgba(107, 167, 204, 0.2);
    }

    .reset-btn {
      background: rgba(20,49,66,0.12);
      color: var(--text);
      box-shadow: none;
    }

    .status-note {
      font-size: 0.95rem;
      opacity: 0.75;
      min-height: 1.3em;
      margin-top: -0.15rem;
    }

    .panel.shake {
      animation: shake 500ms ease-in-out 4;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-8px); }
    }

    .locks.complete {
      opacity: 0;
      transform: translateY(-18px) scale(0.92);
      filter: blur(4px);
      pointer-events: none;
    }

    .actions.complete {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    .celebration {
      display: grid;
      gap: 0.4rem;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transform: translateY(16px);
      transition: opacity 650ms ease 200ms, transform 650ms ease 200ms, max-height 700ms ease 120ms;
    }

    .celebration.show {
      opacity: 1;
      max-height: 220px;
      transform: translateY(0);
    }

    .celebration h2 {
      margin: 0;
      font-size: clamp(1.6rem, 4.1vw, 2.3rem);
    }

    .celebration p {
      margin: 0;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      opacity: 0.85;
    }

    .hint {
      font-size: 0.82rem;
      opacity: 0.62;
    }

    @media (max-width: 560px) {
      .panel { gap: 1rem; }
      .locks { gap: 0.4rem; }
      .submit-btn, .reset-btn { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="state-default">
  <main class="panel" id="panel" aria-live="polite">
    <div class="title-wrap">
      <div class="progress" id="progress">Password 1 of 7</div>
      <h1 id="prompt">Enter the 1st password:</h1>
      <p class="subtext" id="message">Use the locks below, then press submit.</p>
    </div>

    <section class="locks" id="locks" aria-label="Combination locks">
      <div class="digit-lock" data-index="0">
        <button class="step-btn" data-action="up" aria-label="Increase first digit">▲</button>
        <div class="digit-display" id="digit-0" aria-label="First digit" aria-live="off">0</div>
        <button class="step-btn" data-action="down" aria-label="Decrease first digit">▼</button>
      </div>
      <div class="digit-lock" data-index="1">
        <button class="step-btn" data-action="up" aria-label="Increase second digit">▲</button>
        <div class="digit-display" id="digit-1" aria-label="Second digit" aria-live="off">0</div>
        <button class="step-btn" data-action="down" aria-label="Decrease second digit">▼</button>
      </div>
      <div class="digit-lock" data-index="2">
        <button class="step-btn" data-action="up" aria-label="Increase third digit">▲</button>
        <div class="digit-display" id="digit-2" aria-label="Third digit" aria-live="off">0</div>
        <button class="step-btn" data-action="down" aria-label="Decrease third digit">▼</button>
      </div>
      <div class="digit-lock" data-index="3">
        <button class="step-btn" data-action="up" aria-label="Increase fourth digit">▲</button>
        <div class="digit-display" id="digit-3" aria-label="Fourth digit" aria-live="off">0</div>
        <button class="step-btn" data-action="down" aria-label="Decrease fourth digit">▼</button>
      </div>
    </section>

    <div class="actions" id="actions">
      <button class="submit-btn" id="submitBtn">Submit</button>
      <button class="reset-btn" id="resetBtn" type="button">Reset</button>
    </div>

    <div class="status-note" id="statusNote">Touch-friendly and sequence-locked.</div>

    <section class="celebration" id="celebration" aria-live="polite">
      <h2>Congratulations!</h2>
      <p>The system has been fully restored.</p>
      <div class="hint">You completed every password in the correct order.</div>
    </section>
  </main>

  <script>
    const codes = ["1439", "1908", "2806", "6226", "6930", "9213", "9774"];
    const ordinals = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th"];

    const body = document.body;
    const panel = document.getElementById('panel');
    const prompt = document.getElementById('prompt');
    const message = document.getElementById('message');
    const progress = document.getElementById('progress');
    const statusNote = document.getElementById('statusNote');
    const locks = document.getElementById('locks');
    const actions = document.getElementById('actions');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const celebration = document.getElementById('celebration');
    const lockDisplays = Array.from(document.querySelectorAll('.digit-display'));
    const lockControls = Array.from(document.querySelectorAll('.digit-lock'));

    let digits = [0, 0, 0, 0];
    let currentIndex = 0;
    let locked = false;

    function setBodyState(state) {
      body.classList.remove('state-default', 'state-success', 'state-error', 'state-complete');
      body.classList.add(state);
    }

    function updateDigits() {
      digits.forEach((digit, index) => {
        lockDisplays[index].textContent = digit;
      });
    }

    function resetDigits() {
      digits = [0, 0, 0, 0];
      updateDigits();
    }

    function currentCode() {
      return digits.join('');
    }

    function updatePrompt() {
      if (currentIndex < codes.length) {
        progress.textContent = `Password ${currentIndex + 1} of ${codes.length}`;
        prompt.textContent = `Enter the ${ordinals[currentIndex]} password:`;
        message.textContent = 'Use the locks below, then press submit.';
        statusNote.textContent = 'Touch-friendly and sequence-locked.';
      }
    }

    function temporarilyDisableControls(value) {
      locked = value;
      const buttons = document.querySelectorAll('button');
      buttons.forEach(btn => btn.disabled = value);
    }

    function showCompleteState() {
      setBodyState('state-complete');
      progress.textContent = 'System restored';
      prompt.textContent = 'System restored!';
      message.textContent = 'All passwords accepted.';
      statusNote.textContent = 'Access granted.';
      locks.classList.add('complete');
      actions.classList.add('complete');
      setTimeout(() => celebration.classList.add('show'), 250);
    }

    function handleCorrect() {
      temporarilyDisableControls(true);
      setBodyState('state-success');
      prompt.textContent = 'Correct';
      message.textContent = 'Password accepted.';
      statusNote.textContent = 'Preparing next stage...';
      currentIndex += 1;

      if (currentIndex >= codes.length) {
        setTimeout(() => {
          showCompleteState();
        }, 650);
        return;
      }

      setTimeout(() => {
        setBodyState('state-default');
        resetDigits();
        updatePrompt();
        temporarilyDisableControls(false);
      }, 2000);
    }

    function handleIncorrect() {
      temporarilyDisableControls(true);
      setBodyState('state-error');
      prompt.textContent = 'Incorrect!';
      message.textContent = 'That password was not accepted.';
      statusNote.textContent = 'Try again.';
      panel.classList.add('shake');

      setTimeout(() => {
        panel.classList.remove('shake');
        setBodyState('state-default');
        resetDigits();
        updatePrompt();
        temporarilyDisableControls(false);
      }, 2000);
    }

    function changeDigit(index, direction) {
      if (locked) return;
      digits[index] = (digits[index] + direction + 10) % 10;
      updateDigits();
    }

    lockControls.forEach((lock) => {
      const index = Number(lock.dataset.index);
      const [upBtn, , downBtn] = lock.children;

      upBtn.addEventListener('click', () => changeDigit(index, 1));
      downBtn.addEventListener('click', () => changeDigit(index, -1));
    });

    submitBtn.addEventListener('click', () => {
      if (locked || currentIndex >= codes.length) return;
      if (currentCode() === codes[currentIndex]) {
        handleCorrect();
      } else {
        handleIncorrect();
      }
    });

    resetBtn.addEventListener('click', () => {
      if (locked || currentIndex >= codes.length) return;
      resetDigits();
    });

    window.addEventListener('keydown', (event) => {
      if (locked || currentIndex >= codes.length) return;
      if (/^[0-9]$/.test(event.key)) {
        digits = digits.slice(1).concat(Number(event.key));
        updateDigits();
      }
      if (event.key === 'Enter') submitBtn.click();
      if (event.key === 'Backspace') {
        event.preventDefault();
        digits = [0].concat(digits.slice(0, 3));
        updateDigits();
      }
    });

    updateDigits();
    updatePrompt();
  </script>
</body>
</html>
